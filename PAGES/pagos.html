<body>
    <header class="header">
        <nav class="navbar">
            <!--Este seria el logo-->
            <div class="logo"><img src="../IMG/logo.png" alt="logo"></div>
            <!--Este seria el menu-->
            <div class="menu">
                <a href="../INDEX.HTML">Inicio</a>
                <a href="../PAGES/frutas_y_verduras.html">Frutas y verduras</a>
                <a href="../PAGES/granos_y_legumbres.html">Granos y legumbres</a>
                <a href="../PAGES/contactanos.html">Contactanos</a>
            </div>
        </nav>
    </header>
    <main class="container my-5">
        <h2 class="mb-4">Finaliza tu compra</h2>

        <!-- Resumen del pedido -->
        <div class="card mb-4">
            <div class="card-header">
                <strong>Resumen del pedido</strong>
            </div>
            <div class="card-body">
                <p>Producto: LO SELECCIONADO</p>
                <p>Cantidad: 1</p>
                <p>Total: S/ ***.**</p>
            </div>
        </div>

        <!-- Formulario de pago -->
        <form>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre" required>
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="correo" required>
            </div>

            <div class="mb-3">
                <label for="direccion" class="form-label">Dirección para el envío</label>
                <input type="text" class="form-control" id="direccion" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Pagar ahora</button>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
